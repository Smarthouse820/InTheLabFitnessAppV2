}

function ExerciseHistory(props) {
  const weeks = [];
  for (let w = 1; w <= props.currentWeek; w++) {
    const sets = ((props.logs[w] || {})[props.exercise.id] || []).filter(Boolean);
    if (sets.length > 0) weeks.push({ week: w, sets: sets, rating: (props.ratings[w] || {})[props.exercise.id] });
  }
  const chronological = weeks.slice(); // oldest → newest, for the chart
  const displayWeeks = weeks.slice().reverse(); // newest → oldest, for the text list below
  return h("div", { className: "history-list" },
    chronological.length >= 2 && h(ProgressChart, { weeks: chronological, isBodyweight: props.exercise.bodyweight, color: props.color || "#3d97d3" }),
    displayWeeks.length === 0
      ? h("div", { className: "history-empty" }, "No logged sets yet for this exercise.")
      : displayWeeks.map(function (wk) {
          const setStr = wk.sets.map(function (s) {
            return (s.weight != null ? s.weight + "lb×" : "") + s.reps;
          }).join(", ");
          const ratingLabel = wk.rating === "easy" ? "Easy" : wk.rating === "right" ? "Just Right" : wk.rating === "hard" ? "Too Difficult" : "unrated";
          return h("div", { key: wk.week, className: "history-row" },
            h("span", { className: "history-week" }, "Week " + wk.week),
            h("span", { className: "history-sets" }, setStr + " — " + ratingLabel)
          );
        })
  );
}

// A minimal dependency-free SVG bar chart — this app deliberately avoids external charting
// libraries (same reliability reasoning as avoiding other CDN scripts), so this is built from
// plain SVG elements rather than pulling in recharts/chart.js for one feature.
// Lean mass and fat mass sit on very different scales (often 170-190lb vs 20-35lb), so plotting
// both raw would make the fat-mass line look almost flat. Each series is normalized to its own
// min/max range here so both trends are equally readable — the point labels still show real
// pound values, so nothing about the actual numbers is lost, only the shared visual scale.
// A parallel body-composition tracking path for anyone without a reliable way to measure BF%
// directly (calipers, DEXA, a smart scale). Instead of a measured fat mass, this infers an implied
// TDEE from your real smoothed weight trend versus your real logged calorie intake — the same core
// idea MacroFactor is built around, simplified to one fixed blended energy density rather than a
// density that slides with your rate of change.
function AdaptiveTDEESection(props) {
  const [weightInput, setWeightInput] = useState("");
  const todayLogged = props.dailyWeightLogs[todayKey()];
  const tdee = props.adaptiveTDEE;
  const diverging = tdee && !tdee.insufficientData && props.plannedCalories &&
    Math.abs(tdee.impliedTDEE - props.plannedCalories) >= 150;

  return h("div", { style: { marginTop: 24 } },
    h("div", { className: "food-cat-title" }, "Daily Weigh-In (for an adaptive calorie estimate)"),
    h("p", { style: { fontSize: "11px", color: "#737373", marginBottom: 8 } },
      "Optional, separate from the weekly check-in above — logging this daily (even without a BF% measurement) lets the app infer whether your calorie target still matches reality."),
    h("div", { className: "swap-form-row", style: { marginBottom: 12 } },
      h("input", {
        type: "number", inputMode: "decimal", placeholder: todayLogged != null ? "Today: " + todayLogged + " lb" : "Today's Weight",
        value: weightInput, onChange: function (e) { setWeightInput(e.target.value); },
        className: "search-input", style: { flex: 1, margin: 0, boxSizing: "border-box" },
      }),
      h("button", {
        className: "swap-save-btn", style: { flex: 1, padding: "10px 0", fontSize: 14, boxSizing: "border-box" },
        onClick: function () { if (weightInput !== "") { props.logDailyWeight(Number(weightInput)); setWeightInput(""); } },
      }, "Log")
    ),
    tdee && tdee.insufficientData
      ? h("p", { style: { fontSize: "12px", color: "#737373" } },
          "Logged " + tdee.daysLogged + " of the ~" + tdee.daysNeeded + " days needed for a meaningful trend — keep going.")
      : tdee && h("div", { className: "panel" },
          h("h3", null, "Adaptive Estimate (last " + tdee.daysUsed + " days)"),
          h("div", { className: "sleep-duration-row" }, h("span", null, "Real weekly trend"), h("span", null, (tdee.weeklyRateLb > 0 ? "+" : "") + tdee.weeklyRateLb + " lb/week")),
          h("div", { className: "sleep-duration-row" }, h("span", null, "Avg. calories actually logged"), h("span", null, tdee.avgCalories + " cal/day")),
          h("div", { className: "sleep-duration-row" }, h("span", null, "Implied true TDEE"), h("span", null, tdee.impliedTDEE + " cal/day")),
          diverging && h("p", { className: "plan-error", style: { marginTop: 8 } },
            "Your implied TDEE (" + tdee.impliedTDEE + ") differs from your planned calories (" + props.plannedCalories + ") by " +
            Math.abs(tdee.impliedTDEE - props.plannedCalories) + " cal/day — worth recalculating your target through the Custom setup again."),
          h("p", { style: { fontSize: "11px", color: "#525252", marginTop: 8 } },
            "Uses a single fixed energy-density assumption (3,500 cal/lb) rather than one that adjusts for how fast you're changing — a real simplification, not a precise composition measurement.")
        )
  );
}

function BodyCompositionChart(props) {
  const weeks = Object.keys(props.actuals).map(Number).sort(function (a, b) { return a - b; });
  const points = weeks.filter(function (w) {
    const a = props.actuals[w];
    return a && a.weight != null && a.weight !== "" && a.bf != null && a.bf !== "";
  }).map(function (w) {
    const a = props.actuals[w];
    const weight = Number(a.weight), bf = Number(a.bf);
    const fat = Math.round(weight * (bf / 100) * 10) / 10;
    const lean = Math.round((weight - fat) * 10) / 10;
    return { week: w, fat: fat, lean: lean };
  });
  if (points.length < 2) return null;

  function normalize(values) {
    const min = Math.min.apply(null, values), max = Math.max.apply(null, values);
    const range = max - min || 1;
    return values.map(function (v) { return (v - min) / range; });
  }
  const leanNorm = normalize(points.map(function (p) { return p.lean; }));
  const fatNorm = normalize(points.map(function (p) { return p.fat; }));

  const spacing = 46, chartHeight = 100, topPad = 16, sidePad = 16, bottomPad = 18;
  const width = Math.max((points.length - 1) * spacing, 1) + sidePad * 2;
  const leanColor = "#3d97d3", fatColor = "#f0b429";

  function coordsFor(normValues, rawValues) {
    return points.map(function (p, i) {
      const x = i * spacing + sidePad;
      const y = topPad + (chartHeight - normValues[i] * chartHeight);
      return { x: x, y: y, value: rawValues[i], week: p.week };
    });
  }
  const leanCoords = coordsFor(leanNorm, points.map(function (p) { return p.lean; }));
  const fatCoords = coordsFor(fatNorm, points.map(function (p) { return p.fat; }));
  function pathFor(coords) { return coords.map(function (c, i) { return (i === 0 ? "M" : "L") + c.x + "," + c.y; }).join(" "); }

  return h("div", { style: { marginTop: 24 } },
    h("div", { className: "food-cat-title" }, "Lean Mass vs. Fat Mass Trend"),
    h("div", { style: { display: "flex", gap: 16, marginBottom: 8, fontSize: 12 } },
      h("span", { style: { color: leanColor } }, "● Lean Mass"),
      h("span", { style: { color: fatColor } }, "● Fat Mass")
    ),
    h("svg", {
      width: "100%", height: chartHeight + topPad + bottomPad + 10, viewBox: "0 0 " + width + " " + (chartHeight + topPad + bottomPad + 10),
      preserveAspectRatio: "xMinYMin meet",
    },
      h("path", { d: pathFor(leanCoords), fill: "none", stroke: leanColor, strokeWidth: 2, strokeLinejoin: "round", strokeLinecap: "round" }),
      h("path", { d: pathFor(fatCoords), fill: "none", stroke: fatColor, strokeWidth: 2, strokeLinejoin: "round", strokeLinecap: "round" }),
      leanCoords.map(function (c) {
        return h("g", { key: "lean-" + c.week },
          h("circle", { cx: c.x, cy: c.y, r: 3.5, fill: leanColor }),
          h("text", { x: c.x, y: Math.max(c.y - 8, 10), fontSize: 9, fill: leanColor, textAnchor: "middle" }, c.value)
        );
      }),
      fatCoords.map(function (c) {
        return h("g", { key: "fat-" + c.week },
          h("circle", { cx: c.x, cy: c.y, r: 3.5, fill: fatColor }),
          h("text", { x: c.x, y: Math.min(c.y + 15, chartHeight + topPad - 2), fontSize: 9, fill: fatColor, textAnchor: "middle" }, c.value)
        );
      }),
      points.map(function (p, i) {
        return h("text", { key: "wk-" + p.week, x: i * spacing + sidePad, y: chartHeight + topPad + bottomPad, fontSize: 10, fill: "#737373", textAnchor: "middle" }, "Wk " + p.week);
      })
    ),
    h("p", { style: { fontSize: "11px", color: "#525252", marginTop: 4 } },
      "Each line is scaled to its own range so both trends are readable together — labels show the real lb values, only the visual scale is shared.")
  );
}

function ProgressChart(props) {
  const points = props.weeks.map(function (wk) {
    const validSets = wk.sets.filter(function (s) { return s.reps != null; });
    if (props.isBodyweight) {
      const maxReps = validSets.length ? Math.max.apply(null, validSets.map(function (s) { return s.reps || 0; })) : 0;
      return { week: wk.week, value: maxReps };
    }
    const maxWeight = validSets.length ? Math.max.apply(null, validSets.map(function (s) { return s.weight || 0; })) : 0;
    return { week: wk.week, value: maxWeight };
  });
  const maxVal = Math.max.apply(null, points.map(function (p) { return p.value; })) || 1;
  const spacing = 46, chartHeight = 90, topPad = 16, sidePad = 16;
  const width = Math.max((points.length - 1) * spacing, 1) + sidePad * 2;
  const unit = props.isBodyweight ? "" : "lb";

  const coords = points.map(function (p, i) {
    const x = i * spacing + sidePad;
    const y = topPad + (maxVal > 0 ? chartHeight - (p.value / maxVal) * chartHeight : chartHeight);
    return { x: x, y: y, value: p.value, week: p.week };
  });
  const pathD = coords.map(function (c, i) { return (i === 0 ? "M" : "L") + c.x + "," + c.y; }).join(" ");

  return h("div", { style: { marginBottom: 16 } },
    h("div", { style: { fontSize: 11, color: "#737373", marginBottom: 4 } },
      props.isBodyweight ? "Max reps per week (progressive overload)" : "Top weight per week (progressive overload)"),
    h("svg", {
      width: "100%", height: chartHeight + topPad + 26, viewBox: "0 0 " + width + " " + (chartHeight + topPad + 26),
      preserveAspectRatio: "xMinYMin meet",
    },
      h("path", { d: pathD, fill: "none", stroke: props.color, strokeWidth: 2, strokeLinejoin: "round", strokeLinecap: "round" }),
      coords.map(function (c) {
        return h("g", { key: c.week },
          h("circle", { cx: c.x, cy: c.y, r: 4, fill: props.color }),
          h("text", { x: c.x, y: Math.max(c.y - 9, 10), fontSize: 10, fill: "#f5f5f5", textAnchor: "middle" }, c.value + unit),
          h("text", { x: c.x, y: chartHeight + topPad + 18, fontSize: 10, fill: "#737373", textAnchor: "middle" }, "Wk " + c.week)
        );
      })
    )
  );
}

function SetLogger(props) {
  const existing = props.existing;
  const [reps, setReps] = useState(existing && existing.reps != null ? existing.reps : "");
  const [weight, setWeight] = useState(existing && existing.weight != null ? existing.weight : (props.state.weight != null ? props.state.weight : ""));
  const prevDefaultWeight = useRef(props.state.weight);
  // Rest timer fires on blur of the reps field, not on every keystroke (onLog fires per keystroke —
  // typing "12" would otherwise start the timer at "1"). The ref guards against a focus-then-blur
  // with no actual change restarting an in-progress rest period.
  const lastCommittedReps = useRef(existing && existing.reps != null ? String(existing.reps) : "");

  function commitSet() {
    if (reps === "" || String(reps) === lastCommittedReps.current) return;
    lastCommittedReps.current = String(reps);
    if (props.onSetCommitted) props.onSetCommitted();
  }

  useEffect(function () {
    // If the exercise's default weight changed (e.g., after a swap or manual adjustment) and this
    // set is still showing the old default rather than a manually-typed override, follow the update.
    if (props.state.weight !== prevDefaultWeight.current) {
      if (weight === "" || Number(weight) === Number(prevDefaultWeight.current)) {
        setWeight(props.state.weight != null ? props.state.weight : "");
      }
      prevDefaultWeight.current = props.state.weight;
    }
  }, [props.state.weight]);

  useEffect(function () {
    if (reps !== "") {
      props.onLog(Number(reps), props.exercise.bodyweight ? null : Number(weight));
    }
  }, [reps, weight]);

  return h("div", { className: "set-row" },
    h("div", { className: "set-row-top" },
      h("span", { className: "set-label" }, "Set " + (props.setIdx + 1)),
      !props.exercise.bodyweight && h("input", {
        type: "number", inputMode: "decimal", value: weight,
        onChange: function (e) { setWeight(e.target.value); }, placeholder: "lb", className: "set-input",
      }),
      h("input", {
        type: "number", inputMode: "numeric", value: reps,
        onChange: function (e) { setReps(e.target.value); }, onBlur: commitSet, placeholder: "reps", className: "set-input",
      }),
      h("span", { className: "set-target" }, "target " + effectiveRepRange(props.exercise, props.state).repLow + "–" + effectiveRepRange(props.exercise, props.state).repHigh)
    )
  );
}

function lookupBarcode(barcode) {
  const url = "https://world.openfoodfacts.org/api/v2/product/" + encodeURIComponent(barcode) + ".json?fields=product_name,brands,nutriments";
  return fetch(url, { headers: { "User-Agent": "CuttingTracker/1.0 (personal fitness app)" } })
    .then(function (res) { return res.json(); })
    .then(function (data) {
      if (data.status !== 1 || !data.product) return { error: "No product found for that barcode." };
      const n = data.product.nutriments || {};
      if (n["energy-kcal_100g"] == null && n["proteins_100g"] == null) {
        return { error: "Product found, but it doesn't have nutrition data on file." };
      }
      const name = data.product.product_name || "Unknown product" + (data.product.brands ? " (" + data.product.brands + ")" : "");
      return {
        name: name,
        per100: {
          cal: n["energy-kcal_100g"] || 0,
          p: n["proteins_100g"] || 0,
          c: n["carbohydrates_100g"] || 0,
          f: n["fat_100g"] || 0,
        },
      };
    })
    .catch(function () { return { error: "Couldn't reach the food database — check your connection and try again." }; });
}

function BarcodeLogger(props) {
  const [mode, setMode] = useState("idle"); // idle | scanning | loading | found | error | manual
  const [manualCode, setManualCode] = useState("");
  const [product, setProduct] = useState(null);
  const [grams, setGrams] = useState(100);
  const [errorMsg, setErrorMsg] = useState("");
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef = useRef(null);
  const supportsDetector = typeof window !== "undefined" && "BarcodeDetector" in window;

  function stopCamera() {
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    if (streamRef.current) {
      streamRef.current.getTracks().forEach(function (t) { t.stop(); });
      streamRef.current = null;
    }
  }

  useEffect(function () { return stopCamera; }, []);

  function handleBarcode(code) {
    stopCamera();
    setMode("loading");
    lookupBarcode(code).then(function (result) {
      if (result.error) {
        setErrorMsg(result.error);
        setMode("error");
      } else {
        setProduct(result);
        setGrams(100);
        setMode("found");
      }
    });
  }

  function startScan() {
    if (!supportsDetector) { setMode("manual"); return; }
    setMode("scanning");
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
      .then(function (stream) {
        streamRef.current = stream;
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          videoRef.current.play();
        }
        const detector = new window.BarcodeDetector({ formats: ["ean_13", "ean_8", "upc_a", "upc_e"] });
        function scanLoop() {
          if (!videoRef.current) return;
          detector.detect(videoRef.current).then(function (codes) {
            if (codes.length > 0) {
              handleBarcode(codes[0].rawValue);
            } else {
              rafRef.current = requestAnimationFrame(scanLoop);
            }
          }).catch(function () {
            rafRef.current = requestAnimationFrame(scanLoop);
          });
        }
        rafRef.current = requestAnimationFrame(scanLoop);
      })
      .catch(function () {
        setErrorMsg("Couldn't access the camera — check permissions, or enter the barcode number manually.");
        setMode("manual");
      });
  }

  function cancel() {
    stopCamera();
    setMode("idle");
    setProduct(null);
  }

  return h("div", { className: "barcode-box" },
    mode === "idle" && h("div", { className: "barcode-idle-row" },
      h("button", { className: "ex-action-btn", onClick: startScan }, "📷 Scan Barcode"),
      h("button", { className: "ex-action-btn", onClick: function () { setMode("manual"); } }, "Type Barcode #")
    ),
    mode === "scanning" && h("div", { className: "barcode-scan-area" },
      h("video", { ref: videoRef, className: "barcode-video", muted: true, playsInline: true }),
      h("p", null, "Point the camera at the barcode…"),
      h("button", { className: "ex-action-btn", onClick: cancel }, "Cancel")
    ),
    mode === "manual" && h("div", { className: "barcode-manual-row" },
      h("input", {
        type: "text", inputMode: "numeric", value: manualCode, placeholder: "e.g. 3017624010701",
        onChange: function (e) { setManualCode(e.target.value); }, className: "search-input",
      }),
      h("div", { style: { display: "flex", gap: 8 } },
        h("button", { className: "swap-save-btn", style: { flex: 1 }, onClick: function () { if (manualCode) handleBarcode(manualCode); } }, "Look Up"),
        h("button", { className: "ex-action-btn", onClick: cancel }, "Cancel")

    mode === "error" && h("div", { className: "plan-error" },

      ),
      h("div", { style: { display: "flex", gap: 8, marginTop: 8 } },

    )
  );
}

// Shows a simple checklist of supplements tagged to a given timing (a specific meal, or the
// standalone "other" bucket) — same interaction pattern as the meal-status buttons above it.
function SupplementSection(props) {
  const [expanded, setExpanded] = useState(false);
  const supplements = props.supplements || [];
  const allChecked = supplements.length > 0 && supplements.every(function (s) { return !!props.logsToday[s.id]; });
  const prevAllChecked = useRef(allChecked);
  useEffect(function () {
    if (allChecked && !prevAllChecked.current) setExpanded(false); // just completed — collapse
    prevAllChecked.current = allChecked;
  }, [allChecked]);
  if (supplements.length === 0) return null;
  // noCollapse: used when a parent container (e.g. a meal card) already collapses itself once its
  // supplements are done — the checklist just stays a plain sorted list, no second collapse layer.
  if (allChecked && !expanded && !props.noCollapse) {
    return h("div", { style: { marginTop: props.compact ? 8 : 0, marginBottom: props.compact ? 0 : 16 } },
      h("button", {
        className: "ex-action-btn", style: { width: "100%", textAlign: "left" },
        onClick: function () { setExpanded(true); },
      }, "✓ " + (props.title === "Also take" ? "Supplements taken" : props.title + " — done") + " (" + supplements.length + ")")
    );
  }
  // Checked items sink to the bottom while the list is still open, so whatever's left to take
  // stays at the top rather than mixed in with items already handled.
  const ordered = supplements.slice().sort(function (a, b) {
    const aChecked = !!props.logsToday[a.id], bChecked = !!props.logsToday[b.id];
    if (aChecked === bChecked) return 0;
    return aChecked ? 1 : -1;
  });
  return h("div", { style: { marginTop: props.compact ? 8 : 0, marginBottom: props.compact ? 0 : 16 } },
    props.compact
      ? h("div", { style: { fontSize: 11, color: "#737373", marginBottom: 4 } }, props.title + ":")
      : h("div", { className: "food-cat-title" }, props.title),
    ordered.map(function (s) {
      const checked = !!props.logsToday[s.id];
      return h("label", { key: s.id, style: { display: "flex", alignItems: "center", gap: 8, fontSize: 13, padding: "4px 0" } },
        h("input", { type: "checkbox", checked: checked, disabled: props.disabled, onChange: function () { props.toggleLog(s.id); } }),
        h("span", null, s.name)
      );
    })
  );
}

// Lets the person build their own supplement list — deliberately manual entry rather than a

// get checked against NUTRIENT_UL for overlaps.
function SupplementManager(props) {
  const [name, setName] = useState("");
  const [timing, setTiming] = useState("m1");

  function updateRow(i, field, value) {
    const next = nutrientRows.slice();

    setNutrientRows(next);
  }
  function removeRow(i) { setNutrientRows(nutrientRows.filter(function (_, idx) { return idx !== i; })); }

  function submit() {

    const nutrients = nutrientRows.filter(function (r) { return r.nutrient && r.amount; }).map(function (r) { return { nutrient: r.nutrient, amount: Number(r.amount) }; });

    },
      h("h3", { style: { margin: 0 } }, "Supplements"),
      boxExpanded ? h(ChevronUp, { size: 16 }) : h(ChevronDown, { size: 16 })
    ),
    boxExpanded && h(React.Fragment, null,
      props.supplementList.length > 0 && h("div", { style: { marginBottom: 16 } },
        h("button", {
          className: "ex-action-btn", style: { width: "100%", textAlign: "center", border: "2px solid #3d97d3" },
          onClick: function () { props.updateUiPrefs({ yourSupplementsOpen: !listOpen }); },
        }, "Your Supplements (" + props.supplementList.length + ")"),

                (s.nutrients.length ? " · " + s.nutrients.map(function (n) { return (NUTRIENT_UL[n.nutrient] ? NUTRIENT_UL[n.nutrient].label : n.nutrient) + " " + n.amount + (NUTRIENT_UL[n.nutrient] ? NUTRIENT_UL[n.nutrient].unit : ""); }).join(", ") : ""))
            ),

        })

      ),

// Renders one meal card. Food/macro/status buttons are always visible — only the "Also take"
// supplement checklist can be shown/hidden, via a chevron in the header (same placement/style as the

// meal is checked, the checklist auto-hides completely (no confirmation line left behind); the
// chevron stays as the way back in to double-check or fix a mis-tap. The initial `expanded` value is
// computed directly from the real checked-supplement data at mount time (not a fixed default), so a
// meal that was already complete before a tab switch renders hidden immediately on remount rather
// than needing an effect to catch up.
function MealCard(props) {
  const m = props.meal;
  const status = props.status;
  const supplements = props.supplements || [];
  const hasSupplements = supplements.length > 0;
  const allSuppsChecked = hasSupplements && supplements.every(function (s) { return !!props.logsToday[s.id]; });
  const [expanded, setExpanded] = useState(!allSuppsChecked);
  const prevAllChecked = useRef(allSuppsChecked);
  useEffect(function () {
    if (allSuppsChecked && !prevAllChecked.current) setExpanded(false); // just finished — hide
    if (!allSuppsChecked && prevAllChecked.current) setExpanded(true); // unchecked something — show again
    prevAllChecked.current = allSuppsChecked;
  }, [allSuppsChecked]);

  return h("div", { className: "meal-card" + (status && status !== "skip" ? " done" : "") + (props.disabled ? " preview-disabled" : "") },

function NutritionTab(props) {
  const STATUS_OPTS = [
    { id: "full", label: "Full" }, { id: "three_quarter", label: "¾", pct: 75 },
    { id: "half", label: "½", pct: 50 }, { id: "skip", label: "Skip" },
  ];
  const DAY_LABELS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
  const todayOffset = 0, todayIdx = todayDayIdx();
  const isFutureWeek = props.weekOffset < 0;
  const isFutureDay = isFutureWeek || (props.weekOffset === 0 && props.dayIdx > todayIdx);
  const unscheduledOpen = props.uiPrefs.unscheduledSupplementsOpen; // persisted — collapsed by default, stays as left

  // Timed standalone supplements get slotted into the day's timeline alongside meals, sorted by
  // clock time; ones with no time stay in a separate Unscheduled section (rendered above). Building
  // one combined, sorted list — rather than rendering meals and supplements as two separate loops —
  // is what actually achieves "integrated into the meal plan" instead of just improved styling.
  const timedStandalone = props.supplementList.filter(function (s) { return s.timing === "standalone" && s.time; });
  const unscheduledStandalone = props.supplementList.filter(function (s) { return s.timing === "standalone" && !s.time; });
  const unscheduledAllChecked = unscheduledStandalone.length > 0 && unscheduledStandalone.every(function (s) { return !!props.supplementLogsToday[s.id]; });
  const timelineItems = props.meals.map(function (m, idx) {
    return { kind: "meal", sortMin: parseMealTimeToMinutes(m.time), meal: m, mealIdx: idx };
  }).concat(timedStandalone.map(function (s) {
    return { kind: "supplement", sortMin: timeToMinutes(s.time), supplement: s };
  })).sort(function (a, b) {
    const av = a.sortMin == null ? Infinity : a.sortMin;
    const bv = b.sortMin == null ? Infinity : b.sortMin;
    return av - bv;
  });

  function jumpToDate(dateKey) {
    const targetMonday = mondayKeyForDate(new Date(dateKey + "T00:00:00"));
    const thisMonday = mondayKeyForDate(new Date());
    const offset = weeksBetweenMondayKeys(targetMonday, thisMonday);
    const d = new Date(dateKey + "T00:00:00");
    const dow = d.getDay();
    const idx = dow === 0 ? 6 : dow - 1;
    props.setWeekOffset(offset);
    props.setDayIdx(idx);

  const dateLabel = new Date(props.selectedDate + "T00:00:00").toLocaleDateString(undefined, { weekday: "long", month: "short", day: "numeric" });

function MilestonesTab(props) {
  function actualFatForWeek(week) {
    const a = props.actuals[week];
    if (!a || a.weight == null || a.weight === "" || a.bf == null || a.bf === "") return null;
    return Number(a.weight) * (Number(a.bf) / 100);
  }
  function previousActualFat(week) {
    for (let w = week - 1; w >= 1; w--) {
      const f = actualFatForWeek(w);
      if (f != null) return f;
    }
    return null;
  }
  if (!props.hasTargets) {
    const weeksToShow = Math.max(15, props.currentWeek + 1);
    const weeks = [];

        weeks.map(function (w) {

          const actual = props.actuals[w] || {};
          const actualFat = actualFatForWeek(w);
          const prevFat = actualFat != null ? previousActualFat(w) : null;

      "Targets from here on have been re-paced based on your most recent check-in — still aimed at the same final goal, just adjusted for where you actually are."),
    h("div", null,
      milestones.map(function (m) {
        const isCurrent = m.week === props.currentWeek;
        const actual = props.actuals[m.week] || {};
        const actualFat = actualFatForWeek(m.week);
        const prevFat = actualFat != null ? previousActualFat(m.week) : null;

        return h("div", { key: m.week, className: "milestone-card" + (isCurrent ? " current" : "") },

function CustomSetupWizard(props) {
  const [step, setStep] = useState("goals");
  const [goal, setGoal] = useState("cut");
  const [goalMethod, setGoalMethod] = useState("weight");
  const [currentWeight, setCurrentWeight] = useState("");
  const [age, setAge] = useState("");
  const [gender, setGender] = useState("");
  const [heightFeet, setHeightFeet] = useState("");
  const [heightInches, setHeightInches] = useState("");
  const [eatingStart, setEatingStart] = useState("08:00");
  const [eatingEnd, setEatingEnd] = useState("18:00");
  const [trainingTime, setTrainingTime] = useState(""); // optional — empty means no bias applied
  const [wantsIntraWorkout, setWantsIntraWorkout] = useState(false);
  const [dietStyle, setDietStyle] = useState("standard");
  const [targetWeight, setTargetWeight] = useState("");
  const [currentBF, setCurrentBF] = useState("");
  const [targetBF, setTargetBF] = useState("");
  const [activity, setActivity] = useState("moderate");
  const [experience, setExperience] = useState("beginner");
  const [trainingDays, setTrainingDays] = useState([]);
  const [cardioDays, setCardioDays] = useState([]);
  const [equipmentAvailable, setEquipmentAvailable] = useState(["bodyweight"]);
  const [likedFoodsByMealCustom, setLikedFoodsByMealCustom] = useState({ m1: [], m2: [], m3: [], m4: [] });
  const [expandedMeals, setExpandedMeals] = useState({}); // absent/false = collapsed; each meal's food section starts closed
  const [plan, setPlan] = useState(null);
  const [computed, setComputed] = useState(null);

  function toggleLiked(mealKey, name) {
    setLikedFoodsByMealCustom(function (cur) {
      const list = cur[mealKey] || [];
      const next = list.indexOf(name) !== -1 ? list.filter(function (n) { return n !== name; }) : list.concat([name]);
      return Object.assign({}, cur, { [mealKey]: next });
    });
  }
  // Copies one meal's liked foods into every OTHER meal slot that's still completely empty — saves
  // re-picking the same foods 3 more times when someone eats similarly across meals, without
  // clobbering a different meal you've already deliberately customized.
  function copyLikedToEmptyMeals(sourceMealKey) {
    setLikedFoodsByMealCustom(function (cur) {
      const sourceList = cur[sourceMealKey] || [];
      if (sourceList.length === 0) return cur;
      const next = Object.assign({}, cur);
      ["m1", "m2", "m3", "m4"].forEach(function (k) {
        if (k !== sourceMealKey && (!cur[k] || cur[k].length === 0)) next[k] = sourceList.slice();
      });
      return next;
    });
  }
  function toggleDay(list, setList, day, maxCount) {
    setList(function (cur) {
      if (cur.indexOf(day) !== -1) return cur.filter(function (d) { return d !== day; });
      if (maxCount && cur.length >= maxCount) return cur; // ignore extra picks past what this tier needs
      return cur.concat([day]);
    });
  }
  function toggleEquipment(id) {
    setEquipmentAvailable(function (cur) {
      return cur.indexOf(id) !== -1 ? cur.filter(function (e) { return e !== id; }) : cur.concat([id]);
    });
  }

  function goToFoods() {
    const cw = Number(currentWeight);
    if (!cw) { window.alert("Enter your current weight."); return; }
    if (!gender) { window.alert("Select male or female — needed for an accurate calorie estimate."); return; }
    const feet = Number(heightFeet) || 0, inches = Number(heightInches) || 0;
    if (!feet && !inches) { window.alert("Enter your height."); return; }
    const ageNum = Number(age);
    if (!ageNum) { window.alert("Enter your age — needed for an accurate calorie estimate, not just the heart rate guideline."); return; }
    if (eatingEnd <= eatingStart) { window.alert("Eating window end time must be after the start time."); return; }
    const daysNeeded = EXPERIENCE_DAY_COUNT[experience];
    if (trainingDays.length !== daysNeeded) {
      window.alert("Pick exactly " + daysNeeded + " training day" + (daysNeeded > 1 ? "s" : "") + " for the " + experience + " program.");
      return;
    }
    let tw = cw, cbf = null, tbf = null;
    if (goal !== "maintain") {
      if (goalMethod === "bodyfat") {
        cbf = Number(currentBF); tbf = Number(targetBF);
        if (!cbf || !tbf) { window.alert("Enter your current and target body fat %."); return; }
        tw = impliedTargetWeightFromBF(cw, cbf, tbf, goal);
      } else {
        tw = Number(targetWeight);
        if (!tw) { window.alert("Enter your target weight."); return; }
      }
    }
    const heightCm = (feet * 12 + inches) * 2.54;
    const macros = computeCustomMacros(cw, activity, goal, gender, heightCm, ageNum, dietStyle);
    const weeksNeeded = computeWeeksNeeded(cw, tw, goal, macros.maintenance, macros.cal);
    const exercises = buildCustomExercises(goal, experience, trainingDays, cardioDays, equipmentAvailable);
    const milestones = buildCustomMilestones(cw, tw, weeksNeeded, cbf, tbf);
    // Reserved, not added on top: the drink's macros come OUT of the day's computed total before the
    // remaining 4 meals split it evenly, so the day's real total still matches what the wizard shows
    // and promises for the goal pace — nothing extra silently added.
    const intraWorkoutMacros = wantsIntraWorkout ? INTRA_WORKOUT_DEFAULTS[experience] : null;
    const remaining = intraWorkoutMacros
      ? { p: macros.p - intraWorkoutMacros.p, c: macros.c - intraWorkoutMacros.c, f: macros.f - intraWorkoutMacros.f }
      : { p: macros.p, c: macros.c, f: macros.f };
    const perMeal = { p: remaining.p / 4, c: remaining.c / 4, f: remaining.f / 4 };
    const mealTimes = interpolateMealTimes(eatingStart, eatingEnd, 4);
    const slots = [1, 2, 3, 4].map(function (i) {
      return { id: "cm" + i, label: "Meal " + i, time: mealTimes[i - 1], p: Math.round(perMeal.p), c: Math.round(perMeal.c), f: Math.round(perMeal.f) };
    });
    setComputed({
      currentWeight: cw, targetWeight: Math.round(tw * 10) / 10, currentBF: cbf, targetBF: tbf,
      usedBFMethod: goalMethod === "bodyfat" && goal !== "maintain", age: ageNum, gender: gender, heightCm: heightCm,
      macros: macros, weeksNeeded: weeksNeeded, exercises: exercises, milestones: milestones, slots: slots,
      intraWorkout: intraWorkoutMacros,
    });
    setStep("foods");
  }

  function generate() {
    const result = generateCustomPlan(likedFoodsByMealCustom, props.allFoods, computed.slots);
    setPlan(result);
    if (!result.error && !result.results.some(function (r) { return r.error; })) setStep("preview");
  }

  function confirm() {
    props.onComplete({
      goal: goal, currentWeight: computed.currentWeight, targetWeight: computed.targetWeight,

              h("div", { style: { fontSize: 11, color: "#737373", marginBottom: 4 } }, "Apply just this meal to:"),
              h("div", { className: "food-chip-grid" },
                [1, 2, 3, 4].map(function (w) {
                  const isActiveForThisMeal = !!(props.overrides[w] && props.overrides[w][mealKey]);
                  return h("button", {
                    key: w, className: "week-btn" + (isActiveForThisMeal ? " active" : ""),
                    onClick: function () { props.applySingleMealToWeek(w, idx, r); },
                  }, "Week " + w + (isActiveForThisMeal ? " ✓" : ""));
                })
              )
            )
          )
        )
      );
    }),
    h("button", {
      className: "generate-btn",
      onClick: function () { setPlan(generateCustomPlan(props.likedFoods, props.allFoods, props.slots)); },
    }, "Generate All 4 Meals"),
    plan && plan.error && h("div", { className: "plan-error" }, plan.error),
    activeOverrideWeeks.length > 0 && h("div", { style: { marginTop: 16 } },
      h("div", { className: "food-cat-title" }, "Currently customized weeks"),
      activeOverrideWeeks.map(function (w) {
        return h("button", {
          key: w, className: "reset-list-btn", style: { marginRight: 8, marginBottom: 8 },
          onClick: function () { props.revertWeek(w); },
        }, "Revert Week " + w + " to default");
      })
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));

// Registers the service worker for "Add to Home Screen" installability.
// Wrapped in a feature check and try/catch since this must never block the app itself —
// if registration fails (unsupported browser, sw.js missing, etc.) the app still works
// exactly as it did before, just without the install prompt.
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("sw.js").catch(function (err) {
      console.log("Service worker registration failed (app still works fine without it):", err);
    });
  });
}
</script>
</body>
</html>
